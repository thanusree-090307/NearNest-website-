<!DOCTYPE html>
<html>
     <head><title>Project-2</title></head>
     <style>
        body{
            margin: 0;
            background-color: #d9e2ef ;
            font-family: Arial, Helvetica, sans-serif;
            padding-top: 60px;
        }
        .first{
            
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .mid{
            width:420px ;
            background: white;
            border-radius:20px ;
            padding: 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        .section {
            text-align: left;
            margin-bottom: 20px;
        }
        img{
            border-radius: 10%;
            width: 150px;
            height: 150px;
        }
        label {
            font-weight: bold;
            margin-bottom: 8px;
            display: block;
        }
        input{
            width: 100%;
            height: 45px;
            border-radius: 10px;
            border: 1px solid #ccc;
            padding-left: 10px;
            font-size: 15px;
        }
        button{
            width: 100%;
            height: 50px;
            border-radius: 12px;
            border:none;
            background: #6464ed;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            margin-bottom: 10px;
        }
        button:hover{
            background-color: #3d3dcf;
        }
     </style>
     
     <body>
       <div class="first">
       <div class="mid">
        <div class="img">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRAi0vu2Rc05gH1mkMkAHOzcOI9bu1TGJPLiw&s">
        </div>
        <h2>Sign In</h2>
        <div>Sign In To Begin</div>
        <form action="Project2(part4).HTML">
    <div class="section">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Email" required>
    </div>

    <div class="section">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Password" required>
    </div>

    <button type="submit">Sign In</button>
</form>
        </div>
     </body>
</html>
