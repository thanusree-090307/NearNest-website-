<!DOCTYPE html>
<html>
    <head><title>Project-2</title></head>
    <style>
        .page{
            background-color: #d9e2ef ;
            text-align: center;
            padding-top: 50px;
            font-size: x-large;
            padding-bottom: 20px;
        }
        .center p{
            display: block;
            background-color: white;
            width: 400px;
            height: 90px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .center a{
            text-decoration: none;
            color: black;
        }
        .hover {
             transition: transform 0.5s ease;
        }
        .hover:hover{
           transform: scale(1.1);
           border: 2px solid rgb(86, 181, 232);
        }
    </style>
    <body>
        <div class="page">
            <img style="border-radius: 70px; width: 70px; height: 70px;" src="Language pic.png">
            <p>Select Your Language</p>
            <p style="color: gray;">Choose your preferred language</p>
           <center> <a href="Project2(part3).HTML" style="text-decoration: none; color: black;"><div class="center">
                    <p class="hover"><br>English</p>
                    <p class="hover"><br>Hindi</p>
                    <p class="hover"><br>Telugu</p>
                    <p class="hover"><br>Tamil</p>
            </div></a></center>
        </div>
    </body>
</html>
